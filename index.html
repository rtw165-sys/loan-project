<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算APP V0.1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #cadde9;
            padding: 24px;
            color: #1e2c3b;
            text-align: center;
        }

        h1,
        h2 {
            font-size: 2.5rem;
            color: #063e5f;
            margin-bottom: 1rem;
        }

        h2 {
            text-align: left;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .loan-form,
        .result {
            background-color: #ffffff;
            border-radius: 10px;
            margin-bottom: 24px;
            padding: 24px;
            box-shadow: 10px 10px;
        }

        .form-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row label {
            width: 90px;
            font-weight: bold;
            color: #063e5f;
        }

        input[type="number"],
        select {
            padding: 8px 10px;
            border: 1px solid #b0d4ee;
            border-radius: 6px;
            font-size: 1rem;
            width: 180px;
        }

        #clacBtn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 6px;
            border: none;
            background-color: #2589c9;
            color: white;
            cursor: pointer;
            /* 過渡動畫搭配hover */
            transition: background-color 0.2s;
        }


        #clacBtn:hover {
            background-color: #0f4a6e;
        }

        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #2589c9;
        }

        .result {
            box-shadow: 10px 10px rgb(83, 131, 133);
        }

        .summary-table,
        .detial-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .detial-table th {
            background-color: #063e5f;
            color: #ffff;
            padding: 10px;
        }

        .detial-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #e5f6ff;
        }

        .summary-table td:first-child {
            color: #063e5f;
            font-weight: bold;
        }




        .detial-table tr:nth-child(even) {
            background-color: #81b8d8;
            color: #063e5f;
        }


        .summary-table th {
            background-color: #2589c9;
            color: #ffff;
        }



        .summary-table th,
        .summary-table td {
            border: 1px solid #afc4cf;
            padding: 10px 12px;
            text-align: left;
        }

        .subtitle {
            font: 0.5em sans-serif;
            color: #6a8ba2;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>



</head>

<body>
    <div class="container">
        <h1>貸款精算助手
            <span class="subtitle">輸入條件，快速分析您的還款計畫</span>
        </h1>
        <form id="loanForm" action="" class="loan-form">
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input type="number" id="amount" name="amount" value="100" step="10" min="10" required> 萬
            </div>
            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>
            <!-- 新增手續費用欄位  handlingFree-->

            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7" selected>7</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                </select> 年
            </div>
            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1" checked>本息平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本金平均攤還
            </div>
            <button type="submit" id="clacBtn">計算</button>

        </form>
        <h2>｜試算結果</h2>
        <div class="result">
            <!-- 摘要表格 -->
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>每月還款金額</td>
                        <td id="monthlyPayment">6666</td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment">166666</td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest">3666666</td>
                    </tr>
                </tbody>
            </table>

            <!-- 分期明細表格 -->
            <table border="1" class="detial-table">
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>月付金額</th>
                        <th>本金</th>
                        <th>利息</th>
                        <th>剩餘本金</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr>
                        <td>1</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>10000</td>
                        <td>100000</td>
                        <td>6666</td>
                        <td>1000000</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
