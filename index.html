<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算APP V0.1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: #cadde9;
            padding: 24px;
            color: #1e2c3b;
            text-align: center;
        }

        h1,
        h2 {
            font-size: 2.5rem;
            color: #063e5f;
            margin-bottom: 1rem;
        }

        h2 {
            text-align: left;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .loan-form,
        .result {
            background-color: #ffffff;
            border-radius: 10px;
            margin-bottom: 24px;
            padding: 24px;
            box-shadow: 10px 10px;
        }

        .form-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row label {
            width: 90px;
            font-weight: bold;
            color: #063e5f;
        }

        input[type="number"],
        select {
            padding: 8px 10px;
            border: 1px solid #b0d4ee;
            border-radius: 6px;
            font-size: 1rem;
            width: 180px;
        }

        #clacBtn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            font-size: 1rem;
            font-weight: 900;
            border-radius: 6px;
            border: none;
            background-color: #2589c9;
            color: white;
            cursor: pointer;
            /* 過渡動畫搭配hover */
            transition: background-color 0.2s;
        }


        #clacBtn:hover {
            background-color: #0f4a6e;
        }

        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #2589c9;
        }

        .result {
            box-shadow: 10px 10px rgb(83, 131, 133);
        }

        .summary-table,
        .detial-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }

        .detial-table th {
            background-color: #063e5f;
            color: #ffff;
            padding: 10px;
        }

        .detial-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #e5f6ff;
        }

        .summary-table td:first-child {
            color: #063e5f;
            font-weight: bold;
        }




        .detial-table tr:nth-child(even) {
            background-color: #81b8d8;
            color: #063e5f;
        }


        .summary-table th {
            background-color: #2589c9;
            color: #ffff;
        }



        .summary-table th,
        .summary-table td {
            border: 1px solid #afc4cf;
            padding: 10px 12px;
            text-align: left;
        }

        .subtitle {
            font: 0.5em sans-serif;
            color: #6a8ba2;
            font-weight: 400;
            letter-spacing: 1px;
        }
    </style>



</head>

<body>
    <div class="container">
        <h1>貸款精算助手
            <span class="subtitle">輸入條件，快速分析您的還款計畫</span>
        </h1>
        <form id="loanForm" action="" class="loan-form">
            <div class="form-row">
                <label for="amount">貸款金額</label>
                <input type="number" id="amount" name="amount" value="100" step="10" min="10" required> 萬
            </div>
            <div class="form-row">
                <label for="rate">貸款利率</label>
                <input type="number" id="rate" name="rate" value="1.85" step="0.01" min="1"> %
            </div>
            <div class="form-row">
                <label for="loanYears">貸款年限</label>
                <select name="loanYears" id="loanYears">
                    <option value="3">3</option>
                    <option value="5">5</option>
                    <option value="7" selected>7</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                </select> 年
            </div>
            <div class="form-row">
                <label for="repayment">還款方式</label>
                <input type="radio" id="repayment1" name="repayment" value="repaymentMethod1" checked>本金平均攤還
                <input type="radio" id="repayment2" name="repayment" value="repaymentMethod2">本息平均攤還
            </div>
            <!-- 後端才需要submit -->
            <button type="button" id="clacBtn">計算</button>

        </form>
        <h2>｜試算結果</h2>
        <div class="result">
            <!-- 摘要表格 -->
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>每月還款金額</td>
                        <td id="monthlyPayment">-</td>
                    </tr>
                    <tr>
                        <td>總還款金額</td>
                        <td id="totalPayment">-</td>
                    </tr>
                    <tr>
                        <td>總利息支出</td>
                        <td id="totalInterest">-</td>
                    </tr>
                </tbody>
            </table>

            <!-- 分期明細表格 -->
            <table border="1" class="detial-table">
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>月付金額</th>
                        <th>本金</th>
                        <th>利息</th>
                        <th>剩餘本金</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">

                </tbody>
            </table>
        </div>
    </div>


    <script>
        // const title = document.querySelector("h1");
        // console.log(title);

        // title.style.color = "orange";

        // // 1.只改文字 
        // title.innerText = "超級助手!";
        // //2.含標籤語法
        // title.innerHTML = "<b style='background-color:blue'>超級助手!</b>";

        const amountEl = document.querySelector("#amount");
        const rateEl = document.querySelector("#rate");
        const loanYearsEl = document.querySelector("#loanYears");
        const calcBtnEl = document.querySelector("#clacBtn");
        console.log(amountEl, rateEl, loanYearsEl, calcBtnEl);

        calcBtnEl.addEventListener("click", function (e) {
            let amount = amountEl.value;
            let rate = rateEl.value;
            let loanYears = loanYearsEl.value;

            document.getElementById('monthlyPayment').textContent
                = Math.round(schedule[0].payment).toLocaleString('zh-TW') + '元';

            document.getElementById('totalPayment').textContent
                = Math.round(totalPayment).toLocaleString('zh-TW') + '元 ';

            document.getElementById('totalInterest').textContent
                = Math.round(totalInterest).toLocaleString('zh-TW') + '元';



            //多個radio共用name的取值方式`
            let method = document.querySelector(
                "input[name='repayment']:checked"
            ).value;


            console.log(amount, rate, loanYears, method);

            let schedules = repaymentMethod1(amount * 10000, rate, loanYears);

            renderTable(schedules);
        });

        //繪製Table
        function renderTable(schedules) {
            let tableHtml = "";


            for (let i = 0; i < schedules.length; i++) {
                tableHtml += `
                    <tr>
                        <td> ${schedules[i].month}</td>
                        <td> ${schedules[i].monthlyPayment + schedules[i].interest}</td>
                        <td> ${schedules[i].monthlyPayment}</td>
                        <td> ${schedules[i].interest}</td>
                        <td> ${schedules[i].amount}</td>
                    </tr>
                `;
            }

            console.log(tableHtml);

            document.querySelector("#scheduleBody").innerHTML = tableHtml;
        }

        //本金平均攤還
        function repaymentMethod1(amount, rate, years) {
            let monthRate = rate / 100 / 12; //月利率
            let months = years * 12;    //總期數

            let monthlyPayment = Math.round(amount / months);
            console.log(monthRate, months, monthlyPayment);

            schedules = [];
            for (let i = 0; i < months; i++) {
                let interest = Math.round(amount * monthRate);
                amount -= monthlyPayment;

                //最後一期
                if (i == months - 1) {
                    monthlyPayment += amount;
                    amount = 0;
                }

                console.log(`${i + 1} 本金:${monthlyPayment} 利息:${interest} 剩餘餘額:${amount}`);
                schedules.push(
                    {
                        "month": i + 1,
                        "monthlyPayment": monthlyPayment,
                        "interest": interest,
                        "amount": amount
                    }

                );

            }

            console.log(schedules);

            return schedules;
        }

    </script>
</body>

</html>
