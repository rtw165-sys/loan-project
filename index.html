<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款試算App V0.1</title>
</head>
<body>
    <h1>貸款試算App V0.1</h1>
    <hr>
    <form id="loanFrom" action="">
    <label for="amount">貸款金額</label>
    <input type="number" id="amount" name="amount"
    value="100" step="10" min="10" required
    > 萬
    <br>
    <label for="rate">貸款利率</label>&nbsp;&nbsp;&nbsp;&nbsp;
    <input type="number" id="rate" name="rate"
    value="1.85" step="0.1" min="1"> %
    <!--新增手續費用欄位 handlingFee--> 
    <br>
    <label for="rate">貸款手續費</label>
    <input type="number" id="handlingFee" name="handlingFee" placeholder="請輸入相關手續費" required>元
    <select name="loanYears" id="loanYears">
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="7" selected>7</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="40">40</option>

    </select>年
    <br>
    <label for="repayment">還款方式</label>
    <input type="radio" id="repayment1" name="replayementmthod" value="repaymentMethod1" checked>本息平均攤還
    <input type="radio" id="repayment2" name="replayementmthod" value="repaymentMethod2" checked>本金平均攤還

</body>
</html>
